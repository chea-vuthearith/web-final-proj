    <style>
        body {
            background-color: #e7e9d8;
            color: #03695e;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #header {
            z-index: 1000;
        }

        .bg-pattern {
            background-image: 
                radial-gradient(#03695e 1px, transparent 1px),
                url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 400C50 350 100 380 150 320C200 260 250 300 300 240C350 180 400 210 400 150' fill='none' stroke='%2303695e' stroke-opacity='0.03' stroke-width='1'/%3E%3Cpath d='M0 300C60 250 120 280 180 200C240 120 300 150 400 80' fill='none' stroke='%2303695e' stroke-opacity='0.03' stroke-width='1'/%3E%3C/svg%3E");
            background-size: 32px 32px, 800px 800px;
            opacity: 1;
        }

        .travel-sticker {
            filter: drop-shadow(0 15px 25px rgba(3, 105, 94, 0.15)) drop-shadow(0 5px 10px rgba(3, 105, 94, 0.1));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(3deg); }
            66% { transform: translateY(10px) rotate(-2deg); }
        }

        @keyframes wobble {
            0%, 100% { transform: translateX(0) rotate(-5deg); }
            50% { transform: translateX(20px) rotate(5deg); }
        }

        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { opacity: 0; animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-in-right { opacity: 0; animation: slideInRight 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-slide-out-left { animation: slideOutLeft 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideOutLeft { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-50px); } }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.15); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        
        .animate-blob { animation: blob 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .animation-delay-1000 { animation-delay: 1s; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-3000 { animation-delay: 3s; }
        .animation-delay-4000 { animation-delay: 4s; }

        @keyframes spin-slow { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        .animate-spin-slow { animation: spin-slow 3s linear infinite; }
        .animate-spin-reverse { animation: spin-reverse 4s linear infinite; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e7e9d8; }
        ::-webkit-scrollbar-thumb { background: #a5c6db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #239dca; }
    </style>

                icon.classList.add('fa-xmark');

                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');

        // Dynamic Parallax Effect on Mouse Move
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const bgContainer = document.getElementById('bg-elements');
            if (bgContainer) bgContainer.style.transform = `translate(-${x * 40}px, -${y * 40}px)`;

            const stickerLayer = document.getElementById('sticker-layer');
            if (stickerLayer) stickerLayer.style.transform = `translate(${x * 30}px, ${y * 30}px)`;
        });

        function updateBackgroundColors() {
            const blob1 = document.getElementById('blob-1');
            const blob2 = document.getElementById('blob-2');
            if (!blob1 || !blob2) return;

            if (appState === 'quiz') {
                const progress = currentStep / questions.length;
                if (progress > 0.5) {
                    blob1.style.backgroundColor = 'rgba(245, 158, 11, 0.2)'; 
                    blob2.style.backgroundColor = 'rgba(35, 157, 202, 0.2)'; 
                } else {
                    blob1.style.backgroundColor = 'rgba(35, 157, 202, 0.15)';
                    blob2.style.backgroundColor = 'rgba(109, 175, 95, 0.15)';
                }
            } else if (appState === 'results') {
                blob1.style.backgroundColor = 'rgba(3, 105, 94, 0.2)'; 
                blob2.style.backgroundColor = 'rgba(245, 158, 11, 0.2)'; 
            }
        }

        function render() {
            updateBackgroundColors();
            if (appState === 'landing') renderLanding();
            else if (appState === 'quiz') renderQuizWrapper();
            else if (appState === 'loading') renderLoading();
            else if (appState === 'results') renderResults();
            lucide.createIcons();
        }
        

        function renderLanding() {
            root.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[calc(100vh-5rem)] px-4 py-8 text-center animate-fade-in">
                    <div class="animate-slide-up max-w-3xl mx-auto backdrop-blur-3xl bg-white/50 p-8 md:p-14 rounded-[3rem] shadow-[0_32px_64px_rgba(3,105,94,0.1)] border border-white/80 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-brand-aqua via-brand-jade to-brand-herb"></div>
                        
                        <div class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-white/90 text-brand-aqua font-bold text-xs tracking-[0.2em] uppercase mb-6 shadow-sm">
                            <i data-lucide="compass" class="w-4 h-4"></i> Kingdom of Wonder
                        </div>
                        
                        <h1 class="text-5xl md:text-8xl font-black text-brand-jade mb-6 leading-[1.05] tracking-tight drop-shadow-sm">
                            Cambodia <br/> 
                            <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-aqua via-brand-jade to-brand-herb">
                                Travel Compass
                            </span>
                        </h1>
                        <p class="text-brand-jade/80 text-base md:text-xl mb-10 max-w-2xl mx-auto leading-relaxed font-medium">
                            Step into the mist of ancient temples and emerald jungles. Let our intuition-driven guide reveal the destination meant for your soul.
                        </p>
                        <button 
                            onclick="startQuiz()"
                            class="group relative inline-flex items-center justify-center px-10 py-5 text-xl font-black text-white transition-all duration-500 ease-out bg-brand-jade rounded-2xl hover:bg-brand-aqua hover:shadow-[0_20px_50px_rgba(35,157,202,0.4)] hover:-translate-y-2 overflow-hidden"
                        >
                            <span class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
                            <span class="relative flex items-center">
                                Begin Expedition
                                <i data-lucide="arrow-right" class="w-6 h-6 ml-3 transition-transform duration-500 group-hover:translate-x-3"></i>
                            </span>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderQuizWrapper() {
            if (!document.getElementById('quiz-shell')) {
                root.innerHTML = `
                    <div id="quiz-shell" class="flex flex-col items-center justify-center min-h-[calc(100vh-5rem)] px-4 py-8 animate-fade-in overflow-x-hidden">
                        <div class="w-full max-w-2xl flex flex-col h-full justify-center mx-auto">
                            <div class="mb-8 animate-slide-up" style="animation-delay: 0.1s;">
                                <div class="flex justify-between text-xs font-black text-brand-jade/60 mb-3 px-2 uppercase tracking-[0.3em]">
                                    <span id="step-text">Step 1 of ${questions.length}</span>
                                    <span id="progress-text">10%</span>
                                </div>
                                <div class="w-full h-3 bg-white/40 rounded-full overflow-hidden backdrop-blur-md shadow-inner border border-white/50 p-1">
                                    <div id="progress-bar" class="h-full bg-gradient-to-r from-brand-herb via-brand-aqua to-brand-jade transition-all duration-1000 ease-out rounded-full relative" style="width: 10%">
                                        <div class="absolute inset-0 bg-white/30 animate-pulse"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div id="question-container" class="relative w-full min-h-[450px] md:min-h-[500px]"></div>
                            
                            <div class="flex justify-between mt-8 px-2 animate-slide-up" style="animation-delay: 0.3s;">
                                <button id="back-btn" onclick="prevStep()" class="flex items-center px-6 py-3 text-sm font-bold text-brand-jade bg-white/30 rounded-xl backdrop-blur-md transition-all duration-300 opacity-0 pointer-events-none hover:bg-white/60 hover:shadow-lg border border-white/40">
                                    <i data-lucide="chevron-left" class="w-5 h-5 mr-1"></i> Back
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            updateQuizContent();
        }

        function updateQuizContent(slideDirection = 'right') {
            const q = questions[currentStep];
            const progress = ((currentStep + 1) / questions.length) * 100;

            document.getElementById('step-text').innerText = `Step ${currentStep + 1} of ${questions.length}`;
            document.getElementById('progress-text').innerText = `${Math.round(progress)}%`;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            const backBtn = document.getElementById('back-btn');
            if(currentStep === 0) backBtn.classList.add('opacity-0', 'pointer-events-none');
            else backBtn.classList.remove('opacity-0', 'pointer-events-none');

            // Responsive grid adjustments: Use grid-cols-1 on very small screens, sm:grid-cols-2 to prevent overflow
            const optionsHtml = q.options.map((opt, idx) => `
                <button onclick="handleSelect(this, '${q.id}', '${opt.value}')" 
                    class="quiz-option relative flex flex-col items-center justify-center p-6 sm:p-8 rounded-[2rem] border-2 border-white/50 bg-white/50 hover:bg-white/90 hover:border-brand-herb/50 hover:-translate-y-2 hover:shadow-xl transition-all duration-500 ease-out group overflow-hidden w-full h-full"
                    style="animation-delay: ${0.08 * idx}s">
                    <div class="absolute top-0 right-0 w-16 h-16 bg-brand-herb/10 rounded-full -mr-8 -mt-8 transition-transform group-hover:scale-[3]"></div>
                    <i data-lucide="${opt.icon}" class="w-10 h-10 md:w-12 md:h-12 mb-3 md:mb-4 text-brand-jade/40 group-hover:text-brand-herb group-hover:rotate-12 transition-all duration-500"></i>
                    <span class="font-bold md:font-extrabold text-center text-brand-jade/70 group-hover:text-brand-jade transition-colors duration-500 text-lg md:text-xl break-words w-full">${opt.label}</span>
                </button>
            `).join('');

            const animationClass = slideDirection === 'right' ? 'animate-slide-in-right' : 'animate-fade-in';

            // Changed from absolute inset-0 to regular block layout to allow content to dictate height and prevent overflowing
            document.getElementById('question-container').innerHTML = `
                <div id="quiz-card" class="${animationClass} w-full bg-white/70 backdrop-blur-3xl rounded-[3rem] p-6 md:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white flex flex-col justify-center overflow-hidden">
                    <h2 class="text-2xl md:text-4xl font-black text-center text-brand-jade mb-8 md:mb-12 leading-tight tracking-tight px-2">
                        ${q.title}
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 w-full place-items-stretch">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function handleSelect(btnElement, questionId, value) {
            const card = btnElement.closest('#quiz-card');
            if(card.classList.contains('is-transitioning')) return;
            card.classList.add('is-transitioning');

            answers[questionId] = value;

            document.querySelectorAll('.quiz-option').forEach(btn => {
                btn.classList.add('opacity-30', 'scale-95', 'grayscale-[0.5]');
                btn.classList.remove('hover:-translate-y-2', 'hover:shadow-xl', 'hover:bg-white/90');
            });

            btnElement.classList.remove('opacity-30', 'scale-95', 'grayscale-[0.5]', 'border-white/50', 'bg-white/50');
            btnElement.classList.add('border-brand-aqua', 'bg-brand-light/30', 'scale-[1.05]', 'shadow-[0_15px_40px_rgba(35,157,202,0.3)]', 'z-20');
            
            setTimeout(() => {
                card.classList.remove('animate-slide-in-right', 'animate-fade-in');
                card.classList.add('animate-slide-out-left');
                setTimeout(() => {
                    if (currentStep < questions.length - 1) {
                        currentStep++;
                        updateQuizContent('right');
                    } else {
                        calculateResults();
                    }
                }, 400); 
            }, 600); 
        }

        function prevStep() {
            if (currentStep > 0) {
                const card = document.getElementById('quiz-card');
                card.style.animation = 'slideOutRight 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
                setTimeout(() => {
                    currentStep--;
                    updateQuizContent('left'); 
                    document.getElementById('quiz-card').style.animation = 'slideInLeft 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
                }, 350);
            }
        }

        function renderLoading() {
            root.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[calc(100vh-5rem)] text-center animate-fade-in px-4">
                    <div class="relative w-36 h-36 md:w-48 md:h-48 mb-10">
                        <div class="absolute inset-0 rounded-full border-[6px] border-transparent border-t-brand-jade animate-spin-slow opacity-80"></div>
                        <div class="absolute inset-4 rounded-full border-[6px] border-transparent border-t-brand-aqua animate-spin-reverse opacity-80"></div>
                        <div class="absolute inset-8 rounded-full border-[6px] border-transparent border-t-brand-gold animate-spin-slow opacity-80" style="animation-duration: 2.5s;"></div>
                        <i data-lucide="compass" class="absolute inset-0 m-auto w-12 h-12 md:w-16 md:h-16 text-brand-jade animate-pulse"></i>
                    </div>
                    <h3 class="text-brand-gold text-sm md:text-base font-black tracking-[0.3em] uppercase mb-4 animate-slide-up">Plotting Coordinates</h3>
                    <h2 class="text-4xl md:text-5xl font-black text-brand-jade mb-4 animate-slide-up" style="animation-delay: 0.1s;">Crafting your journey...</h2>
                    <p class="text-brand-jade/60 text-xl md:text-2xl font-medium animate-slide-up" style="animation-delay: 0.2s;">The Khmer spirits are whispering the way.</p>
                </div>
            `;
            
            if(!document.getElementById('dynamic-keyframes')) {
                const style = document.createElement('style');
                style.id = 'dynamic-keyframes';
                style.innerHTML = `
                    @keyframes slideOutRight { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(50px); } }
                    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
                `;
                document.head.appendChild(style);
            }
        }

        function triggerConfetti() {
            if (typeof confetti === 'function') {
                const duration = 3000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#03695e', '#239dca', '#f59e0b', '#6daf5f']
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#03695e', '#239dca', '#f59e0b', '#6daf5f']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }
        }

        function renderResults() {
            const top = topMatches[0];
            const runnersUp = topMatches.slice(1, 3);
            const calculatePercentage = (score) => Math.min(99, Math.max(78, Math.round((score / questions.length) * 100 + (Math.random() * 12))));

            root.innerHTML = `
                <div class="min-h-screen py-12 px-4 md:px-8 animate-fade-in pb-40">
                    <div class="max-w-7xl mx-auto">
                        <div class="text-center mb-16 md:mb-24 animate-slide-up">
                            <h3 class="text-brand-gold text-sm md:text-base font-black tracking-[0.4em] uppercase mb-4 md:mb-6 flex items-center justify-center gap-3">
                                <i data-lucide="map" class="w-5 h-5 md:w-6 md:h-6"></i> Expedition Map Unveiled
                            </h3>
                            <h1 class="text-5xl md:text-8xl font-black text-brand-jade mb-8 tracking-tighter">Your Soul's Destination</h1>
                            <button onclick="resetApp()" class="group inline-flex items-center text-sm font-black text-brand-aqua hover:text-white hover:bg-brand-aqua transition-all duration-500 bg-white/80 px-8 py-4 rounded-2xl backdrop-blur-md shadow-lg border border-white hover:shadow-2xl hover:-translate-y-2">
                                <i data-lucide="refresh-cw" class="w-5 h-5 mr-3 transition-transform group-hover:rotate-180 duration-700"></i> New Expedition
                            </button>
                        </div>

                        <div class="mb-16 md:mb-20 bg-white/90 backdrop-blur-3xl rounded-[3rem] overflow-hidden shadow-[0_50px_100px_rgba(3,105,94,0.2)] border border-white flex flex-col lg:flex-row transform transition-all duration-700 hover:shadow-[0_60px_120px_rgba(3,105,94,0.25)] animate-slide-up" style="animation-delay: 0.2s">
                            <div class="lg:w-3/5 h-[400px] lg:h-auto relative overflow-hidden group">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent z-10"></div>
                                <img src="${top.image}" alt="${top.name}" class="w-full h-full object-cover transition-transform duration-2000 group-hover:scale-110" />
                                <div class="absolute top-6 right-6 md:top-10 md:right-10 z-20">
                                    <div class="w-20 h-20 md:w-28 md:h-28 bg-brand-jade/95 backdrop-blur-xl rounded-full flex flex-col items-center justify-center border-4 border-brand-herb/40 shadow-2xl transform rotate-12 hover:rotate-0 transition-all duration-500">
                                        <span class="text-2xl md:text-3xl font-black text-white leading-none">${calculatePercentage(top.score + 1)}%</span>
                                        <span class="text-[8px] md:text-[10px] uppercase font-black text-brand-light tracking-widest mt-1">Match</span>
                                    </div>
                                </div>
                                <div class="absolute bottom-8 left-8 md:bottom-12 md:left-12 z-20 pr-8 md:pr-12">
                                    <div class="inline-flex items-center px-4 py-2 md:px-6 md:py-2.5 rounded-full bg-brand-herb text-white text-[10px] md:text-xs font-black shadow-xl mb-4 tracking-widest uppercase">
                                        <i data-lucide="crown" class="w-3 h-3 md:w-4 md:h-4 mr-2"></i> Prime Selection
                                    </div>
                                    <h2 class="text-5xl md:text-8xl font-black text-white drop-shadow-2xl leading-[0.9] tracking-tighter">
                                        ${top.name}
                                    </h2>
                                </div>
                            </div>
                            
                            <div class="lg:w-2/5 p-8 md:p-12 flex flex-col justify-center bg-gradient-to-br from-white/90 to-brand-bg/80 relative">
                                <div class="flex items-center text-brand-aqua mb-3 font-black tracking-[0.3em] uppercase text-xs md:text-sm">
                                    <i data-lucide="map-pin" class="w-5 h-5 mr-2"></i> Exploration Point
                                </div>
                                <h4 class="text-lg md:text-xl font-bold text-brand-jade mb-3">${top.tagline}</h4>
                                <p class="text-base md:text-lg text-brand-jade/80 mb-6 leading-relaxed font-medium">
                                    ${top.description}
                                </p>

                                <div class="grid grid-cols-2 gap-3 mb-6">
                                    <div class="bg-brand-light/20 p-3 rounded-2xl border border-brand-light/30">
                                        <div class="text-[9px] uppercase font-black tracking-widest text-brand-jade mb-1">Highlights</div>
                                        <div class="font-bold text-xs text-brand-jade/80">${top.highlights.slice(0, 3).join(', ')}</div>
                                    </div>
                                    <div class="bg-brand-light/20 p-3 rounded-2xl border border-brand-light/30">
                                        <div class="text-[9px] uppercase font-black tracking-widest text-brand-jade mb-1">Weather</div>
                                        <div class="font-bold text-xs text-brand-jade/80">${top.weather}<br/>${top.bestTime}</div>
                                    </div>
                                </div>

                                <div class="flex flex-wrap gap-2 mt-auto">
                                    ${top.tags.slice(0,4).map(tag => `<span class="px-3 py-1 bg-brand-light/30 text-brand-jade text-[9px] font-black uppercase tracking-widest rounded-full border border-brand-light/60 backdrop-blur-md">${tag}</span>`).join('')}
                                </div>
                                
                                <a href="destination-detail.html?id=${top.id}" class="mt-6 w-full py-4 md:py-5 bg-brand-jade text-white rounded-xl font-black text-base md:text-lg hover:bg-brand-aqua transition-all duration-500 shadow-2xl hover:shadow-[0_20px_60px_rgba(35,157,202,0.4)] hover:-translate-y-2 flex justify-center items-center group">
                                    Explore Full Guide <i data-lucide="chevron-right" class="w-4 h-4 md:w-5 md:h-5 ml-2 transition-transform duration-500 group-hover:translate-x-2"></i>
                                </a>
                            </div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-8 md:gap-12">
                            ${runnersUp.map((match, i) => `
                                <a href="destination-detail.html?id=${match.id}" class="bg-white/80 backdrop-blur-2xl rounded-[3rem] overflow-hidden shadow-2xl border border-white/80 group hover:-translate-y-4 transition-all duration-700 animate-slide-up flex flex-col block" style="animation-delay: ${0.4 + (i * 0.2)}s">
                                    <div class="h-64 md:h-80 relative overflow-hidden">
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent z-10 opacity-70 group-hover:opacity-90 transition-opacity duration-500"></div>
                                        <img src="${match.image}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />
                                        <div class="absolute top-4 left-4 z-20 flex gap-2">
                                            <span class="px-3 py-1.5 rounded-lg bg-white/90 text-brand-jade text-[9px] font-black uppercase tracking-widest shadow-lg">Alternative #${i+2}</span>
                                            <span class="px-3 py-1.5 rounded-lg bg-brand-aqua text-white text-[9px] font-black uppercase tracking-widest shadow-lg">${calculatePercentage(match.score)}% Match</span>
                                        </div>
                                        <div class="absolute bottom-6 left-6 right-6 z-20">
                                            <h3 class="text-3xl md:text-4xl font-black text-white leading-none tracking-tight mb-2">${match.name}</h3>
                                            <p class="text-brand-gold font-bold text-xs md:text-sm tracking-wide uppercase">${match.tagline}</p>
                                        </div>
                                    </div>
                                    <div class="p-8 md:p-10 flex-grow flex flex-col">
                                        <p class="text-brand-jade/80 mb-8 line-clamp-3 text-lg md:text-xl font-bold leading-relaxed">${match.description}</p>
                                        <div class="flex flex-wrap gap-2 mt-auto">
                                            ${match.tags.slice(0, 3).map(tag => `<span class="px-3 py-1 bg-brand-bg/90 text-brand-herb text-[9px] font-black uppercase tracking-tighter rounded-md">${tag}</span>`).join('')}
                                        </div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            // Fire the confetti!
            triggerConfetti();
        }

        function startQuiz() {
            appState = 'quiz';
            currentStep = 0;
            answers = {};
            render();
        }

        function calculateResults() {
            appState = 'loading';
            render();
            setTimeout(() => {
                const selectedTags = Object.values(answers);
                const scoredDestinations = destinations.map(dest => ({ ...dest, score: selectedTags.filter(tag => dest.tags.includes(tag)).length }));
                scoredDestinations.sort((a, b) => b.score - a.score || 0.5 - Math.random());
                topMatches = scoredDestinations.slice(0, 3);
                appState = 'results';
                render();
            }, 3000); 
        }

        function resetApp() {
            appState = 'landing';
            currentStep = 0;
            answers = {};
            topMatches = [];
            render();
        }
 
        render();

    </script>
</body>
</html>
