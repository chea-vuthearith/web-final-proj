    <style>
        body {
            background-color: #e7e9d8;
            color: #03695e;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg-pattern {
            background-image: 
                radial-gradient(#03695e 1px, transparent 1px),
                url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 400C50 350 100 380 150 320C200 260 250 300 300 240C350 180 400 210 400 150' fill='none' stroke='%2303695e' stroke-opacity='0.03' stroke-width='1'/%3E%3Cpath d='M0 300C60 250 120 280 180 200C240 120 300 150 400 80' fill='none' stroke='%2303695e' stroke-opacity='0.03' stroke-width='1'/%3E%3C/svg%3E");
            background-size: 32px 32px, 800px 800px;
            opacity: 1;
        }

        .travel-sticker {
            filter: drop-shadow(0 15px 25px rgba(3, 105, 94, 0.15)) drop-shadow(0 5px 10px rgba(3, 105, 94, 0.1));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-25px) rotate(3deg); }
            66% { transform: translateY(15px) rotate(-2deg); }
        }

        @keyframes wobble {
            0%, 100% { transform: translateX(0) rotate(-5deg); }
            50% { transform: translateX(20px) rotate(5deg); }
        }

        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { opacity: 0; animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-in-right { opacity: 0; animation: slideInRight 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-slide-out-left { animation: slideOutLeft 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideOutLeft { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-50px); } }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.15); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        
        .animate-blob { animation: blob 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .animation-delay-1000 { animation-delay: 1s; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-3000 { animation-delay: 3s; }
        .animation-delay-4000 { animation-delay: 4s; }

        @keyframes spin-slow { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        .animate-spin-slow { animation: spin-slow 3s linear infinite; }
        .animate-spin-reverse { animation: spin-reverse 4s linear infinite; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e7e9d8; }
        ::-webkit-scrollbar-thumb { background: #a5c6db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #239dca; }
    </style>

            answers[questionId] = value;

            document.querySelectorAll('.quiz-option').forEach(btn => {
                btn.classList.add('opacity-30', 'scale-90', 'grayscale-[0.5]');

                                </p>

                                <div class="grid grid-cols-2 gap-4 mb-8">
                                    <div class="bg-brand-light/20 p-4 rounded-2xl border border-brand-light/30">
                                        <div class="text-[10px] uppercase font-black tracking-widest text-brand-jade mb-1">Highlights</div>
                                        <div class="font-bold text-sm text-brand-jade/80">${top.highlights.slice(0, 3).join(', ')}</div>
                                    </div>
                                    <div class="bg-brand-light/20 p-4 rounded-2xl border border-brand-light/30">
                                        <div class="text-[10px] uppercase font-black tracking-widest text-brand-jade mb-1">Weather</div>
                                        <div class="font-bold text-sm text-brand-jade/80">${top.weather}<br/>${top.bestTime}</div>
                                    </div>
                                </div>

                                <div class="flex flex-wrap gap-2 mt-auto">
                                    ${top.tags.slice(0,4).map(tag => `<span class="px-4 py-1.5 bg-brand-light/30 text-brand-jade text-[10px] font-black uppercase tracking-widest rounded-full border border-brand-light/60 backdrop-blur-md">${tag}</span>`).join('')}
                                </div>
                                
                                <!-- LINK TO THE DETAIL PAGE FROM YOUR GITHUB REPO -->
                                <a href="destination-detail.html?id=${top.id}" class="mt-8 w-full py-6 bg-brand-jade text-white rounded-2xl font-black text-lg hover:bg-brand-aqua transition-all duration-500 shadow-2xl hover:shadow-[0_20px_60px_rgba(35,157,202,0.4)] hover:-translate-y-2 flex justify-center items-center group">
                                    Explore Full Guide <i data-lucide="chevron-right" class="w-5 h-5 ml-2 transition-transform duration-500 group-hover:translate-x-2"></i>
                                </a>
                            </div>
                        </div>

                        <!-- Grid -->
                        <div class="grid md:grid-cols-2 gap-12">
                            ${runnersUp.map((match, i) => `
                                <!-- LINKS TO THE DETAIL PAGE FROM YOUR GITHUB REPO -->
                                <a href="destination-detail.html?id=${match.id}" class="bg-white/80 backdrop-blur-2xl rounded-[4rem] overflow-hidden shadow-2xl border border-white/80 group hover:-translate-y-4 transition-all duration-700 animate-slide-up flex flex-col block" style="animation-delay: ${0.4 + (i * 0.2)}s">
                                    <div class="h-80 relative overflow-hidden">
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent z-10 opacity-70 group-hover:opacity-90 transition-opacity duration-500"></div>
                                        <img src="${match.image}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />
                                        <div class="absolute top-6 left-6 z-20 flex gap-2">
                                            <span class="px-4 py-2 rounded-xl bg-white/90 text-brand-jade text-[10px] font-black uppercase tracking-widest shadow-lg">Alternative #${i+2}</span>
                                            <span class="px-4 py-2 rounded-xl bg-brand-aqua text-white text-[10px] font-black uppercase tracking-widest shadow-lg">${calculatePercentage(match.score)}% Match</span>
                                        </div>
                                        <div class="absolute bottom-8 left-8 right-8 z-20">
                                            <h3 class="text-4xl font-black text-white leading-none tracking-tight mb-2">${match.name}</h3>
                                            <p class="text-brand-gold font-bold text-sm tracking-wide uppercase">${match.tagline}</p>
                                        </div>
                                    </div>
                                    <div class="p-12 flex-grow flex flex-col">
                                        <p class="text-brand-jade/80 mb-10 line-clamp-3 text-xl font-bold leading-relaxed">${match.description}</p>
                                        <div class="flex flex-wrap gap-2 mt-auto">
                                            ${match.tags.slice(0, 3).map(tag => `<span class="px-4 py-1.5 bg-brand-bg/90 text-brand-herb text-[10px] font-black uppercase tracking-tighter rounded-lg">${tag}</span>`).join('')}
                                        </div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function startQuiz() {
            appState = 'quiz';
            currentStep = 0;
            answers = {};
            render();
        }

        function calculateResults() {
            appState = 'loading';
            render();
            setTimeout(() => {
                const selectedTags = Object.values(answers);
                const scoredDestinations = destinations.map(dest => ({ ...dest, score: selectedTags.filter(tag => dest.tags.includes(tag)).length }));
                scoredDestinations.sort((a, b) => b.score - a.score || 0.5 - Math.random());
                topMatches = scoredDestinations.slice(0, 3);
                appState = 'results';
                render();
            }, 3000); 
        }

        function resetApp() {
            appState = 'landing';
            currentStep = 0;
            answers = {};
            topMatches = [];
            render();
        }
 
        render();

    </script>
</body>
</html>
